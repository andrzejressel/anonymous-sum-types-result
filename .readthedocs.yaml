# Read the Docs configuration file
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

# Required
version: 2

# Set the OS, Python version, and other tools you might need
build:
  os: ubuntu-24.04
  tools:
    #    python: "3.13"
    rust: "latest"
  apt_packages:
    - just
  jobs:
    #    post_checkout:
    #      - git fetch --unshallow

    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html
      #      - curl -fsSL https://get.pulumi.com | sh
      #      - /home/docs/.pulumi/bin/pulumi version
      
      #      - PATH="$PATH:/home/docs/.pulumi/bin" just docs
      - just docs
      - mv target/doc/* $READTHEDOCS_OUTPUT/html/
      - echo "<meta http-equiv=\"refresh\" content=\"0;url=anon_sum_types_lib\" />" > $READTHEDOCS_OUTPUT/html/index.html
      - ls -al $READTHEDOCS_OUTPUT/html
      - cat $READTHEDOCS_OUTPUT/html/index.html
    build:
      html:
        - "true"